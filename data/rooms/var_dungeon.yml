name: The Memory Banks
description: A dark library where the history of the Great Kernel Panic is recorded in scrolling text.
detailed_description: |
  /var/log - The Memory Banks

  Row upon row of towering shelves stretch into darkness, each containing millions of log files.
  The air hums with the constant whisper of write operations as the system continues to record its pain.

  Crash reports scroll endlessly across the walls in glowing amber text. You see the same timestamps
  repeated over and over: the moment of the Great Kernel Panic, burned into the system's memory forever.

  [CRITICAL] [CRITICAL] [CRITICAL] - the words echo through the halls.

  In a dusty alcove, you spot a terminal still displaying the original error log. The truth about
  what caused the apocalypse might be written here, preserved in the Memory Banks.

  Some of the newer logs seem to be tracking... you. Your movements. Your awakening. The system is watching.
exits:
