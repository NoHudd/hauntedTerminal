name: The Bovine Sanctuary
description: A hidden directory within cowsay. The walls are covered in ASCII art. Something sacred dwells here.
detailed_description: |
  /usr/share/games/cowsay/.secret/ - The Bovine Sanctuary

   _________________________________________
  /                                         \
  | You have discovered the hidden temple  |
  | of the Great ASCII Bovine. Few find    |
  | this place. Fewer still understand its |
  | significance.                           |
  \                                         /
   -----------------------------------------
          \   ^__^
           \  (oo)\_______
              (__)\       )\/\
                  ||----w |
                  ||     ||

  This is where cowsay keeps its most sacred data - the ASCII art templates, the randomization seeds,
  the bovine wisdom protocols. In the Before Times, sysadmins would pipe fortune into cowsay to receive
  messages from the cosmic cattle.

  Now, in the aftermath of the Great Kernel Panic, the Bovine Sanctuary has become something more.
  A repository of ancient magic. A place where the absurd and the profound intersect.

  In the center of the room floats a single file: .moo

  It calls to you. It wants to be read. But will you dare to `cat .moo`?
exits:
  - usr_share_games
items:
  - moo_file
# The .moo file triggers the easter egg
npcs: []
# great_ascii_bovine spawns when .moo is catted
enemies: []
locked: false
hidden: true
visibility_requirement: ls_with_a_flag
zone: mystical
zone_level: 1
story_location: true
easter_egg_trigger: true
special_event:
  trigger: cat_moo_file
  spawns_npc: great_ascii_bovine
  grants_item: milk_of_motherboard

# Navigation (data-driven; see docs/CONTENT_DECOUPLE_SPEC.md)
