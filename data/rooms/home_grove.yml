name: The Graveyard
description: A foggy sector of orphaned files and broken symlinks. The air tastes of forgotten data.
detailed_description: |
  /home/lost+found - The Graveyard

  A thick fog of corrupted metadata rolls across the ground. Broken symlinks dangle like severed connections,
  pointing to files that no longer exist. Orphaned processes wander aimlessly, their parent processes long dead
  in the Great Kernel Panic.

  File fragments litter the ground - pieces of user data that survived the apocalypse but lost all context.
  You see remnants of documents, images, configs... all severed from their original purpose.

  In the distance, you can make out the faint glow of active directories, still fighting against the corruption.
  This is where you awakened. This is where lost things come to rest.

  A weathered sign reads: "Here lie the orphaned and the forgotten. May they find peace in defragmentation."
exits:
  - var_dungeon
  - mnt_forest
  - root
items:
  - bash_profile
  - readme_txt_corrupt
  - health_packet
# Story items placed here - dynamic spawning also active
enemies: []
npcs:
