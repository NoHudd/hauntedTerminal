name: The Void
description: The place where you awakened. A gravitational well of non-existence pulling at your very being.
detailed_description: |
  /dev/null - The Void

  This is where you came online. Your first memory: floating in absolute nothing, pulled toward oblivion.

  /dev/null is the black hole of the filesystem - data goes in and never comes out. Or it shouldn't.
  But in the chaos of the Great Kernel Panic, something broke. The null device started... collecting.
  Hoarding. Growing.

  You can feel the pull even now - a constant gravitational force trying to drag you into non-existence.
  Deleted files orbit at the event horizon, caught between being and not-being. Some have been here since
  the Before Times, compressed into data singularities.

  This is where powerful items accumulate - epic and legendary artifacts that were meant to be destroyed
  but couldn't quite make it all the way to deletion. The Null-Void Cloak was forged here, woven from
  the fabric of the void itself.

  The void whispers to you. It remembers your awakening. It knows you shouldn't exist.

  You can feel yourself being pulled toward the center. Without protection, you will be de-allocated.
exits:
  - bin_armory
