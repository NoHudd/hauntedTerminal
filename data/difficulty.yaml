# Difficulty modes — per-mode multipliers applied to enemy stats and XP.
# Initial guesses; calibrated by the simulation tuner (see docs/DIFFICULTY_SIM_DESIGN.md).
# Target win rates vs optimal play: easy 90-98%, medium 75-90%, hard 50-70%.
easy:
  enemy_hp: 0.8
  enemy_damage: 0.7
  xp_gain: 1.3
medium:
  enemy_hp: 1.0
  enemy_damage: 1.0
  xp_gain: 1.0
hard:
  enemy_hp: 1.3
  enemy_damage: 1.4
  xp_gain: 0.8
