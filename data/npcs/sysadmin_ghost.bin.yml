name: Sysadmin Ghost
short_description: The restless spirit of a system administrator
description: The phantom essence of a former sysadmin who gave their life defending the system from the initial corruption. They appear as flickering terminal screens and sudo command prompts, still trying to maintain order from beyond.
dialogues:
  - "I failed to stop the corruption when it first began. Do not repeat my mistakes."
  - "The Daemon Overlord was once just a rogue process. I should have killed -9 it when I had the chance."
  - "These config files hold the system's deepest secrets. Guard them well—they're what keeps the machine's soul intact."
  - "Root access is both blessing and curse. With great privilege comes the power to heal... or destroy."
  - "I have seen the core before its corruption. It was beautiful—pure logic, perfect function. It can be that way again."
on_talk:
  message: The Sysadmin Ghost speaks with the weight of experience and regret, each word echoing with administrative authority.