  rarity: rare
  tags: ["exploit", "offensive", "reach"]
  allowed_zones: ["usr", "lib", "mnt"]
  persistence: "persistent"

recursion_fang:
  name: "Recursion Fang"
  description: "A staff-fang whose every strike echoes a smaller strike within it, down and down until the stack gives out."
  type: "weapon"
  damage: 17
  allowed_classes:
    - shaman
  rarity: rare
  tags: ["mystical", "staves", "offensive"]
  allowed_zones: ["lib", "usr", "mnt"]
  persistence: "persistent"

