name: The Kernel Gate
description: A checkpoint guarded by the Firewall Knight. Passage is Read-Only without proper permissions.
detailed_description: |
  /etc/iptables - The Kernel Gate

  A massive gateway carved from firewall rules blocks your path. The gate pulses with packet-filtering logic,
  its surface etched with access control lists that shift and change in real-time.

  Standing before the gate is the Firewall Knight - an iptables process that has become sentient, bound by
  ancient protocols to guard the path to the Kernel. Its armor is made of nested ACCEPT/REJECT rules, its
  sword forged from DROP commands.

  "This directory is Read-Only," the Knight intones, its voice echoing with administrative authority.
  "Unless you carry the chmod Key, you shall pass no further into the Kernel."

  The Knight's eyes glow with the light of port 443. It has been here since the Before Times, fulfilling
  its purpose even as the world burned. It cannot be reasoned with. It cannot be bribed. It can only
  recognize proper file permissions.

  Beyond the gate, you can see the path to the Core - the beating heart of the system, where the
  Daemon Overlord waits.

  The Knight will not move. Not without the Key.
exits:
  - usr_lib_arcane
  - core  # Only accessible with chmod_key
