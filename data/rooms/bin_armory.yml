name: The Armory
description: A hall of glowing command icons - cp, mv, rm - the Tools of the Creators made manifest.
detailed_description: |
  /bin - The Armory

  The fundamental commands of the system hover in the air like sacred relics. Each one glows with its own light:

  'cp' - the Duplicator, pulsing with the power of creation
  'mv' - the Relocator, shimmering as it phases between states
  'rm' - the Eraser, crackling with barely contained destructive force
  'ls' - the Revealer, its light exposing hidden truths

  These are the Tools of the Creators, the commands that built the world. In the Before Times, they were
  wielded to construct entire systems. Now they lie dormant, their power waiting to be reclaimed.

  In the corner, you notice a fragmented shell process - /bin/sh - stuttering and incomplete. It tries
  to speak but its words come out corrupted. A manual page lies open on an ancient terminal, yellowed
  with age but still readable.

  "To see the hidden, use ls -a" - the manual whispers. "Even ghosts have names in the eyes of the Root."
exits:
  - root
  - usr_lib_arcane
  - dev_null_void
items:
  - ancient_manual_man
# Ancient manual teaches ls -a command
enemy_tier: 1
enemy_count: 2
npcs:
